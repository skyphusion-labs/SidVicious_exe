name: image

# Build the SidVicious roadie image and push it to GHCR on a version tag.
#
# The Discord bot (bot.mjs) runs as a Docker stack on dischord, deployed from
# fleet-chezmoi (system/stacks/dischord/sidvicious/). This workflow produces the
# immutable, versioned image that stack pins -- replacing the old anti-pattern
# of bind-mounting /root/dev + running `npm ci` at container start
# (fleet-chezmoi#170). The repo already ships a self-contained Dockerfile
# (node:24-slim, npm ci --omit=dev, non-root); this just builds and publishes it.
#
# Trigger: push a SemVer tag (e.g. v0.1.0). The image is tagged with the clean
# version (0.1.0), the major.minor (0.1), and the commit sha. NO :latest -- the
# fleet-chezmoi compose pins an explicit version so a redeploy is deterministic.
# workflow_dispatch allows a manual rebuild of an existing ref.
#
# Runner: GitHub-hosted ubuntu-latest (PUBLIC repo -> fork-safe, per fleet CI
# policy). Pushes as GITHUB_TOKEN, which is scoped to this repo owner and links
# the package to the repo automatically.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: image-sidvicious-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/skyphusion-labs/sidvicious

jobs:
  build-push:
    name: Build and push sidvicious image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
