# Dischord fleet stack: SidVicious_exe (punk rock Discord roadie)
#
# Secrets (never committed): create ~/dev/SidVicious_exe/stacks/.env with:
#   DISCORD_TOKEN         - Discord bot token (required)
#   CF_ACCOUNT_ID         - Cloudflare account ID (required for Claude + images)
#   CF_API_TOKEN          - CF API token with AI Gateway permission, alias CF_AIG_TOKEN
#                           (required for Claude + images; add D1 Edit for session persistence)
# Optional (omit to disable the matching feature; leave blank for defaults):
#   DISCORD_MODEL         - chat model (default anthropic/claude-sonnet-4-6 when a CF token is set)
#   DISCORD_CHANNEL_IDS   - comma-separated channel IDs (empty = DMs + @mentions only)
#   DISCORD_HISTORY       - rolling history depth in exchange pairs (default 20)
#   CF_AIG_GATEWAY_ID     - AI Gateway name (default skyphusion-llm)
#   CF_GATEWAY_ENDPOINT   - full compat URL override (built from account + gateway id if blank)
#   CF_D1_DATABASE_ID     - D1 database ID for session persistence
#   CF_D1_TOKEN           - D1 token if different from CF_API_TOKEN
#   SEARCH_WORKER_URL     - sidvicious-search Worker base URL (web search + knowledge base)
#   SEARCH_SECRET         - shared secret for the X-Search-Secret header
#   OLLAMA_BASE_URL       - ollama fallback when no CF token is set (chat only, no images)
#
# Claude backend (default): set CF_ACCOUNT_ID + CF_API_TOKEN
# Ollama backend:           unset CF_API_TOKEN, set OLLAMA_BASE_URL + DISCORD_MODEL=<ollama model>
#
# Deploy:   ssh root@dischord.internal "cd ~/dev/SidVicious_exe/stacks && docker compose -p sidvicious -f dischord.yml up -d"
# Redeploy: ssh root@dischord.internal "cd ~/dev/SidVicious_exe/stacks && docker compose -p sidvicious -f dischord.yml up -d --force-recreate sidvicious"
# Logs:     ssh root@dischord.internal "docker compose -p sidvicious -f ~/dev/SidVicious_exe/stacks/dischord.yml logs -f"

services:
  sidvicious:
    image: node:24
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm ci --silent && node bot.mjs"
    volumes:
      - /root/dev/SidVicious_exe:/app
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_MODEL: ${DISCORD_MODEL:-anthropic/claude-sonnet-4-6}
      DISCORD_CHANNEL_IDS: ${DISCORD_CHANNEL_IDS:-}
      DISCORD_HISTORY: ${DISCORD_HISTORY:-20}
      DISCORD_LOG: /dev/stdout
      CF_ACCOUNT_ID: ${CF_ACCOUNT_ID:-}
      CF_API_TOKEN: ${CF_API_TOKEN:-}
      CF_AIG_GATEWAY_ID: ${CF_AIG_GATEWAY_ID:-skyphusion-llm}
      CF_GATEWAY_ENDPOINT: ${CF_GATEWAY_ENDPOINT:-}
      CF_D1_DATABASE_ID: ${CF_D1_DATABASE_ID:-}
      CF_D1_TOKEN: ${CF_D1_TOKEN:-}
      SEARCH_WORKER_URL: ${SEARCH_WORKER_URL:-}
      SEARCH_SECRET: ${SEARCH_SECRET:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://wendy.internal:11434/v1}
