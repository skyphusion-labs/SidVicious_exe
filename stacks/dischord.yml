# Dischord fleet stack: SidVicious_exe
#
# Copy .env.example to stacks/.env and fill in values.
#
# Deploy:   docker compose -p sidvicious -f stacks/dischord.yml up -d
# Redeploy: docker compose -p sidvicious -f stacks/dischord.yml up -d --force-recreate sidvicious
# Logs:     docker compose -p sidvicious -f stacks/dischord.yml logs -f

services:
  sidvicious:
    image: node:24
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm ci --silent && node bot.mjs"
    volumes:
      - ..:/app
    env_file:
      - .env
    environment:
      DISCORD_LOG: /dev/stdout
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://127.0.0.1:11434/v1}
