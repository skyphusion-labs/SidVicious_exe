name = "sidvicious-search"
main = "src/index.ts"
compatibility_date = "2025-06-14"
compatibility_flags = ["nodejs_compat"]
workers_dev = true  # the sid bot calls the workers.dev door directly with X-Search-Secret; pin true so a manual deploy or sweep cannot silently close a consumed door (IaC owns the flag; SidVicious_exe#12)

[browser]
binding = "BROWSER"

[ai]
binding = "AI"

[[vectorize]]
binding = "KNOWLEDGE"
index_name = "sidvicious-knowledge"

# Secrets (set via: wrangler secret put <NAME>)
#   BRAVE_API_KEY
#   TAVILY_API_KEY
#   SEARCH_SECRET    shared token the Discord bot sends in X-Search-Secret
